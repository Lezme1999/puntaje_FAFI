<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Puntaje FAFI</title>
    <link rel="icon" type="images" href="images/fafi.JPG">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="cuadro">
        <h1>Mi Puntaje FAFI</h1>
        <h2>Calificaciones</h2>

        <p>Ingresa tus puntajes</p>

        <div class="Puntaje">
            <label for="parcial1">Primera Parcial:</label>
            <div class="input-wrapper">
                <input type="number" id="parcial1" name="parcial1" min="0" max="30" step="1" required placeholder="0 - 30">
            </div>
        </div>

        <div class="Puntaje">
            <label for="parcial2">Segunda Parcial:</label>
            <div class="input-wrapper">
                <input type="number" id="parcial2" name="parcial2" min="0" max="30" step="1" required placeholder="0 - 30">
            </div>
        </div>

        <div class="Puntaje">
            <label for="TP1">Primer T. P.:</label>
            <div class="input-wrapper">
                <input type="number" id="TP1" name="TP1" min="0" max="20" step="1" required placeholder="0 - 20">
            </div>
        </div>

        <div class="Puntaje">
            <label for="TP2">Segundo T. P.:</label>
            <div class="input-wrapper">
                <input type="number" id="TP2" name="TP2" min="0" max="20" step="1" required placeholder="0 - 20">
            </div>
        </div>

        <div class="Puntaje">
            <label for="final">Examen Final:</label>
            <div class="input-wrapper">
                <input type="number" id="final" min="0" max="30" step="1" placeholder="0 - 30">
            </div>
        </div>

        <h2 id="notaFinal">Tu nota aparecerá aquí</h2>
    </div>

    <!-- Engranaje -->
    <div id="gear-btn">⚙️</div>

    <!-- Panel de temas -->
    <div id="color-panel">
        <p>Elige un tema</p>
        <div class="color-option" data-bg="#1a1a1a" data-accent="#f5e642"> Negro / Amarillo</div>
        <div class="color-option" data-bg="#0a1628" data-accent="#4fc3f7"> Marino / Celeste</div>
        <div class="color-option" data-bg="#1a0a2e" data-accent="#c084fc"> Oscuro / Violeta</div>
        <div class="color-option" data-bg="#0d2818" data-accent="#4ade80"> Bosque / Verde</div>
        <div class="color-option" data-bg="#2a0a0a" data-accent="#f87171"> Oscuro / Rojo</div>
    </div>

    <script src="javascript/script.js"></script>
</body>
</html>
